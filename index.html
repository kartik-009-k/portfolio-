<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartik Gaikwad 3D</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<style>
body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
}

/* 3D CANVAS */
#canvas{
  position:fixed;
  width:100%;
  height:100vh;
  top:0;
  left:0;
  z-index:1;
  pointer-events:none;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}

/* CONTENT */
section{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 10%;
  position:relative;
  z-index:10;
}

.card{
  background:rgba(255,255,255,0.03);
  padding:40px;
  border-left:3px solid #00f2ff;
  backdrop-filter:blur(10px);
  max-width:500px;
}

.right{margin-left:auto}
.center{text-align:center;margin:auto}

h1{font-size:4rem}
h2{color:#00f2ff}
</style>
</head>

<body>

<!-- 3D CHARACTER -->
<div id="canvas">
  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.82/build/spline-viewer.js"></script>

<spline-viewer url="https://my.spline.design/cybernetichuman-OFh2Ru0pcBwIeklNBJ8QP5pa/"></spline-viewer>
</div>

<!-- HERO -->
<section>
  <div class="card">
    <h1>Kartik Gaikwad</h1>
    <p>Crafting motion, clarity, and ambition.</p>
    <p style="color:#00f2ff">96.5% JEE Math • IMO Rank 791</p>
  </div>
</section>

<!-- ABOUT -->
<section>
  <div class="card right">
    <h2>About</h2>
    <p>Math-focused student developer with strong academic consistency.</p>
  </div>
</section>

<!-- PROJECTS -->
<section>
  <div class="card">
    <h2>Projects</h2>
    <p>Voice calculator • Core CS • Portfolio rebuild</p>
  </div>
</section>

<!-- JOURNEY -->
<section>
  <div class="center">
    <h2>Journey</h2>
    <p>2021 → 2025 → Now</p>
  </div>
</section>

<!-- CONTACT -->
<section>
  <div class="center">
    <h2>Contact</h2>
    <p>github.com/kartik-009-k</p>
  </div>
</section>

<script>
gsap.registerPlugin(ScrollTrigger);

/* SCROLL STORY */
let tl = gsap.timeline({
  scrollTrigger:{
    trigger:"body",
    start:"top top",
    end:"bottom bottom",
    scrub:1.5
  }
});

/* Move 3D canvas */
tl.to("#canvas",{
  x:"-20%",
  duration:2
})
.to("#canvas",{
  x:"20%",
  duration:2
})
.to("#canvas",{
  x:"0%",
  duration:2
});
</script>

</body>
</html>
