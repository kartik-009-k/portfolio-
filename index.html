<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartik Gaikwad</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<!-- LENIS -->
<script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.29/bundled/lenis.min.js"></script>

<style>
:root{
  --bg:#0a0a0a;
  --accent:#00f2ff;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:white;
  font-family:'Space Grotesk',sans-serif;
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border:2px solid var(--accent);
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  transition:transform 0.15s ease;
}
.cursor.big{
  transform:translate(-50%,-50%) scale(2);
}

/* CHARACTER */
#viewport{
  position:fixed;
  width:100%;
  height:100vh;
  z-index:5;
  pointer-events:none;
}
#char{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:220px;
}

/* glow */
#glow{
  position:absolute;
  top:40%;
  left:50%;
  width:140px;
  height:140px;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,var(--accent),transparent 70%);
  opacity:0;
  filter:blur(30px);
}
.flicker{
  animation:flick 0.12s infinite alternate;
}
@keyframes flick{
  from{opacity:0.3}
  to{opacity:0.7}
}

/* sections */
section{
  height:100vh;
  display:flex;
  align-items:center;
  padding:0 10%;
  z-index:10;
  position:relative;
}
.card{
  background:rgba(255,255,255,0.03);
  padding:40px;
  border-left:3px solid var(--accent);
  backdrop-filter:blur(10px);
}
.right{margin-left:auto}
.center{text-align:center;margin:auto}

h1{font-size:4rem}
h2{color:var(--accent)}
</style>
</head>

<body>

<div class="cursor"></div>

<div id="viewport">
  <div id="char">

    <div id="glow"></div>

    <svg viewBox="0 0 100 120">
      <g stroke="white" stroke-width="2" fill="none" stroke-linecap="round">

        <g id="headGroup">
          <circle id="head" cx="50" cy="25" r="10"/>
          <circle id="eyeL" cx="47" cy="23" r="1" fill="#00f2ff"/>
          <circle id="eyeR" cx="53" cy="23" r="1" fill="#00f2ff"/>
        </g>

        <line x1="50" y1="35" x2="50" y2="70"/>

        <line id="armL" x1="50" y1="45" x2="35" y2="60"/>
        <line id="armR" x1="50" y1="45" x2="65" y2="60"/>

        <path id="legs" d="M40,100 L50,70 L60,100"/>

        <g id="desk" opacity="0">
          <line x1="20" y1="95" x2="80" y2="95" stroke="#333"/>
          <rect x="35" y="75" width="30" height="20" stroke="#555"/>
        </g>

      </g>
    </svg>

  </div>
</div>

<section>
  <div class="card">
    <h1>Kartik Gaikwad</h1>
    <p>Crafting motion, clarity, and ambition.</p>
  </div>
</section>

<section>
  <div class="card right">
    <h2>About</h2>
    <p>96.5% JEE Math • IMO Rank 791 • Strong logic base</p>
  </div>
</section>

<section>
  <div class="card">
    <h2>Projects</h2>
    <p>Voice calculator • Core CS • Portfolio rebuild</p>
  </div>
</section>

<section>
  <div class="center">
    <h2>Journey</h2>
    <p>2021 → 2025 → Now</p>
  </div>
</section>

<section>
  <div class="center">
    <h2>Contact</h2>
    <p>github.com/kartik-009-k</p>
  </div>
</section>

<script>

/* LENIS SMOOTH */
const lenis = new Lenis();
function raf(time){
  lenis.raf(time);
  requestAnimationFrame(raf);
}
requestAnimationFrame(raf);

/* CURSOR */
const cursor=document.querySelector(".cursor");
window.addEventListener("mousemove",(e)=>{
  cursor.style.left=e.clientX+"px";
  cursor.style.top=e.clientY+"px";
});

/* HOVER EFFECT */
document.querySelectorAll("a, .card").forEach(el=>{
  el.addEventListener("mouseenter",()=>cursor.classList.add("big"));
  el.addEventListener("mouseleave",()=>cursor.classList.remove("big"));
});

/* BREATHING ANIMATION */
gsap.to("#char",{
  y:"+=10",
  duration:2,
  yoyo:true,
  repeat:-1,
  ease:"sine.inOut"
});

/* HEAD FOLLOW */
window.addEventListener("mousemove",(e)=>{
  let x=(e.clientX/window.innerWidth-0.5)*25;
  let y=(e.clientY/window.innerHeight-0.5)*25;

  gsap.to("#headGroup",{x,y,duration:0.4,ease:"power2.out"});
});

/* GLOW REACT */
window.addEventListener("mousemove",(e)=>{
  let intensity=Math.abs(e.clientX/window.innerWidth-0.5);
  gsap.to("#glow",{opacity:intensity});
});

/* SCROLL STORY */
gsap.registerPlugin(ScrollTrigger);

let tl=gsap.timeline({
  scrollTrigger:{
    trigger:"body",
    start:"top top",
    end:"bottom bottom",
    scrub:1.5
  }
});

/* HERO → ABOUT */
tl.to("#char",{left:"25%",scale:0.85,ease:"power3.inOut"});

/* ABOUT → PROJECTS */
tl.to("#char",{left:"60%",rotation:5});

/* SIT */
tl.to("#desk",{opacity:1})
.to("#legs",{attr:{d:"M30,90 L50,70 L70,90"}}, "<")
.to("#armL",{attr:{x2:45,y2:80}}, "<")
.to("#armR",{attr:{x2:55,y2:80}}, "<")
.to("#glow",{opacity:0.6,onStart:()=>glow.classList.add("flicker")}, "<");

/* PROJECT → JOURNEY */
tl.to("#desk",{opacity:0})
.to("#glow",{opacity:0})
.to("#legs",{attr:{d:"M40,100 L50,70 L60,100"}})
.to("#char",{left:"80%",rotation:-5});

/* FINAL */
tl.to("#char",{left:"50%",scale:1.2,rotation:0});

</script>

</body>
</html>
